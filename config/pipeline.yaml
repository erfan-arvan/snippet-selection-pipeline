# snippet-selection-pipeline configuration.
#
# Fill in each repo's `path` (and ideally `commit`, for reproducibility) after you've cloned
# it locally - the pipeline does not clone anything itself. `build_system` values below are
# my best knowledge of each project's primary build tool; VERIFY before running, especially
# the two flagged exceptions.

output_dir: ./output

# Fallback commands used ONLY when a target repo (in `repos:` below) doesn't ship its own
# gradlew/mvnw wrapper - almost none of the 16 need this, since virtually every real-world
# Gradle/Maven project on GitHub ships one. Every other gradle invocation in the pipeline
# (building method-analyzer, running Specimin, building/checking a packaged snippet) always
# uses that project's own bundled wrapper and never touches these two values - so on a
# system with no system-wide `gradle`/`mvn` at all (e.g. an HPC cluster with only a Java
# module), the pipeline still works as long as every target repo ships its own wrapper.
gradle_command: gradle
maven_command: mvn

tools:
  method_analyzer_dir: ../tools/method-analyzer
  specimin_dir: null   # REQUIRED: set to your local clone of https://github.com/njit-jerse/specimin
  # method_analyzer_jar: optional override; defaults to
  #   <method_analyzer_dir>/build/libs/method-analyzer-all.jar (built automatically if missing)

filtering:
  min_loc: 20
  max_loc: 30
  # Which of the six §9.3 criteria a method must pass to be selected as a candidate
  # (Stage C). Every manifest record already has all six computed individually
  # (isStatic, noAnnotations, hasJavadoc, paramAndReturnOk, locInRange, allTypesJdk), so
  # changing this list changes what counts as a candidate without needing to regenerate
  # the manifest - just re-run the `select` stage.
  required_criteria:
    - isStatic
    - noAnnotations
    - hasJavadoc
    - paramAndReturnOk
    - locInRange
    - allTypesJdk

checker_framework:
  version: "4.2.1"            # verify: https://github.com/typetools/checker-framework/releases
  gradle_plugin_version: "0.6.42"  # verify: https://plugins.gradle.org/plugin/org.checkerframework

checkers_file: checkers.yaml

repos:
  - name: netty
    path: null
    commit: null
    build_system: maven

  - name: spring-framework
    path: null
    commit: null
    build_system: gradle

  - name: kafka
    path: null
    commit: null
    build_system: gradle

  - name: druid
    path: null
    commit: null
    build_system: maven

  - name: dubbo
    path: null
    commit: null
    build_system: maven

  - name: libgdx
    path: null
    commit: null
    build_system: gradle

  - name: spring-boot
    path: null
    commit: null
    build_system: gradle

  - name: rxjava
    path: null
    commit: null
    build_system: gradle

  # NOTE: Selenium builds with Bazel, not Gradle or Maven - neither classpath-resolution
  # strategy in classpath.py will work for it as-is. Either supply a `classpath_override`
  # file (a pre-computed classpath, one jar per line) or exclude this repo from the run.
  - name: selenium
    path: null
    commit: null
    build_system: maven  # placeholder only - see note above; will fail until overridden
    classpath_override: null

  - name: mybatis-3
    path: null
    commit: null
    build_system: maven

  - name: guava
    path: null
    commit: null
    build_system: maven

  # NOTE: javaguide is primarily a Markdown study-notes repository, not a buildable Java
  # project - expect few or no candidate methods (and no dependency jars to resolve) from it.
  - name: javaguide
    path: null
    commit: null
    build_system: maven

  - name: ghidra
    path: null
    commit: null
    build_system: gradle

  - name: hudi
    path: null
    commit: null
    build_system: maven

  - name: apollo
    path: null
    commit: null
    build_system: maven

  - name: WxJava
    path: null
    commit: null
    build_system: maven
